<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexusAI</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div class="app">
    <header class="app-header">
      <div class="header-top">
        <div>
          <h1>本地 AI 聊天助手</h1>
          <p id="health-status">正在检查服务状态...</p>
        </div>
        <div class="header-actions">
          <select id="model-select" class="model-select"></select>

          <button id="clear-history-button" class="secondary-button" type="button">
            清空会话
          </button>
        </div>
      </div>
    </header>

    <main class="chat-container">
      <div id="message-list" class="message-list"></div>

      <form id="chat-form" class="chat-form">
        <textarea id="message-input" class="message-input" placeholder="请输入你的问题" rows="4"></textarea>
        <button id="send-button" class="send-button" type="submit">
          发送
        </button>
      </form>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
